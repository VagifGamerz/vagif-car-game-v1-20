<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>V&D Caravan Beast</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; }
        #ui { position: fixed; top: 20px; left: 20px; color: #ffcc00; font-family: 'Ubuntu', sans-serif; font-size: 24px; z-index: 10; font-weight: bold; }
        #gas-btn { position: fixed; bottom: 30px; right: 30px; width: 90px; height: 90px; background: rgba(255,204,0,0.3); border-radius: 50%; border: 3px solid #ffcc00; touch-action: none; z-index: 10; }
    </style>
</head>
<body>

    <div id="ui">MƏSAFƏ: <span id="dist">0</span>m</div>
    <div id="gas-btn"></div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Constraint, Body, Events } = Matter;
        const engine = Engine.create();
        const render = Render.create({
            element: document.body,
            engine: engine,
            options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: '#111' }
        });

        // 1. Maşın (Karvan Gövdəsi)
        const carBody = Bodies.rectangle(200, 300, 120, 50, { collisionFilter: { group: -1 }, render: { fillStyle: '#ffcc00' }, frictionAir: 0.02 });
        const wheelA = Bodies.circle(160, 330, 20, { collisionFilter: { group: -1 }, friction: 1, restitution: 0.5 });
        const wheelB = Bodies.circle(240, 330, 20, { collisionFilter: { group: -1 }, friction: 1, restitution: 0.5 });

        const axleA = Constraint.create({ bodyA: carBody, pointB: { x: -40, y: 25 }, bodyB: wheelA, stiffness: 0.2, length: 10, render: { visible: false } });
        const axleB = Constraint.create({ bodyA: carBody, pointB: { x: 40, y: 25 }, bodyB: wheelB, stiffness: 0.2, length: 10, render: { visible: false } });

        // 2. Sonsuz Yol üçün Zəmin
        const grounds = [];
        function addGround(x) {
            const g = Bodies.rectangle(x, 550, 1000, 100, { isStatic: true, render: { fillStyle: '#333' }, friction: 1 });
            grounds.push(g);
            Composite.add(engine.world, g);
        }
        addGround(500);
        addGround(1500);

        Composite.add(engine.world, [carBody, wheelA, wheelB, axleA, axleB]);

        // 3. İdarəetmə
        let isGassing = false;
        document.getElementById('gas-btn').addEventListener('touchstart', () => isGassing = true);
        document.getElementById('gas-btn').addEventListener('touchend', () => isGassing = false);

        Events.on(engine, 'beforeUpdate', () => {
            if (isGassing) {
                // Təkərləri fırlat (Qaz ver)
                Body.setAngularVelocity(wheelA, 0.15);
                Body.setAngularVelocity(wheelB, 0.15);
            }

            // KAMERA İZLƏMƏSİ (Əsas məsələ budur)
            const posX = carBody.position.x;
            render.bounds.min.x = posX - 200;
            render.bounds.max.x = posX + (window.innerWidth - 200);
            
            // Yolun bitməməsi üçün yeni hissələr artır
            if (posX > grounds[grounds.length - 1].position.x - 500) {
                addGround(grounds[grounds.length - 1].position.x + 1000);
            }

            document.getElementById('dist').innerText = Math.floor(posX / 10);
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);
    </script>
</body>
</html>
